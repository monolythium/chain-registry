# ---- Foundation RPC endpoints ----
# Order = first-touch preference. Clients walk top-to-bottom and pick
# the first reachable endpoint. After connection the SDK switches to
# on-chain `node-registry` (precompile 0x1005) for live peer selection.
#
# The healthy public foundation node endpoints are advertised below. Each
# protocore process listens on 0.0.0.0:8545; the cost-based RPC rate-limiter is
# the DoS mitigation. Reachability of each endpoint below was confirmed by an
# external provenance, sync, and P2P TCP probes at the v0.1.44 testnet head.
#
# RELAYS FIRST (ordering is load-bearing). The relays below run
# `serve_snapshots = true` and serve the COMPLETE fast-sync closure (the [1,R]
# `committed-ref-by-height` index). Operators serve only a partial snapshot
# (`by_height = 0`), which makes a cold-start node fatal-abort on the A2 boot
# invariant and crash-loop. An un-pinned node resolves its `fast_sync` seeds in
# THIS file's order, so the relays MUST lead the `[[rpc]]` list. Pinned fleet
# nodes set their own `[fast_sync].seed_rpc_urls` and ignore this ordering, so
# this only affects fresh / reprovisioned cold-start nodes — exactly the ones
# that need a complete closure. Do not move operators above the relays.

[[rpc]]
url      = "http://178.105.45.210:8545"
provider = "monolythium-foundation"
region   = "fsn1"
tier     = "official"
notes    = "relay-1; serves complete fast-sync closure (cold-start preferred)"

