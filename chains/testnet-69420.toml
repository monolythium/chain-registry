chain_id     = 69420
network      = "testnet-69420"
display_name = "Monolythium Testnet"
description  = "Live development testnet for Monolythium / LythiumDAG-BFT. Foundation-operated. Wipe + regenesis is allowed without notice — do NOT store value on this network."

# Pinned to the genesis the live cluster is currently running. Any
# wipe + regenesis flips this hash and bumps the registry entry.
genesis_hash = "0xe67cf82131fc63e335ce61afeae53299283eaa3a692830a618911aa840245031"

# Short SHA of the mono-core commit each advertised foundation operator
# was built from. Track production releases at
# https://github.com/monolythium/mono-core
# Signed node release the foundation operators are running:
# protocore v0.0.25-testnet — tag + tarball at
# https://github.com/monolythium/protocore/releases
binary_sha   = "e4697f9b"

# ---- Native receipt proof trust policy ----
# Optional trust metadata for SDK-side native receipt proof verification.
# This testnet entry intentionally does not publish active signer keys yet.
# Do not uncomment placeholders; publish only real, intended-active keys.
#
# [receipt_proof_trust.archive]
# signature_threshold = 2
# valid_from_height = 0
# valid_to_height = 12345
#
# [[receipt_proof_trust.archive.signers]]
# public_key = "0x..."
# signer_id = "0x..."
# valid_from_height = 0
# valid_to_height = 12345
# notes = "placeholder only"
#
# [receipt_proof_trust.finality]
# mode = "cluster"
# chain_id = 69420
# threshold = 5
# committee_size = 7
# cluster_public_key = "0x..."
# valid_from_round = 0
# valid_to_round = 12345
#
# # Alternative finality policy shape, instead of cluster mode:
# # [receipt_proof_trust.finality]
# # mode = "multisig"
# # threshold = 5
# # [[receipt_proof_trust.finality.signers]]
# # authority_index = 0
# # public_key = "0x..."
# # valid_from_round = 0
# # valid_to_round = 12345
# # notes = "placeholder only"

# ---- Foundation RPC endpoints ----
# Order = first-touch preference. Clients walk top-to-bottom and pick
# the first reachable endpoint. After connection the SDK switches to
# on-chain `node-registry` (precompile 0x1005) for live peer selection.
#
# Open public RPC is enabled on every foundation node (all 12 operators +
# 2 relays). Each protocore process listens on 0.0.0.0:8545; the cost-based
# RPC rate-limiter is the DoS mitigation. Reachability of each endpoint below
# was confirmed by an external eth_chainId probe returning 0x10f2c.

[[rpc]]
url      = "http://178.105.12.9:8545"
provider = "monolythium-foundation"
region   = "fsn1"
tier     = "official"
notes    = "operator-1"

