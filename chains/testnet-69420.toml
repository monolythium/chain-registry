# Pinned to the genesis the live cluster is currently running. Any
# wipe + regenesis flips this hash and bumps the registry entry.
# 2026-06-30 v0.3.0 LIFECYCLE-ACTIVE RE-GENESIS (protocore v0.3.0-testnet,
# mono-core master @ 4d781ed9) set the genesis_hash below, superseding the
# 2026-06-28 BIP-39 genesis 0xaabb0f1e…. v0.3.0 activates the dynamic DVT
# cluster lifecycle from genesis (committed per-boundary sealed rosters +
# announce-ahead reconfiguration + round-keyed orderer/committer;
# dynamic_cluster_lifecycle_height = 0 in the milestone config) and fully purges
# FROST/DKG/BLS from the chain. The re-genesis regenerated the 2x10 operator/p2p
# keys from the standard BIP-39 -> ML-DSA-65 mnemonics. The nextgen-v2 design
# carries over: binary sparse-Merkle state tree (BLAKE3); encrypted mempool +
# LythiumSeal removed (plaintext mempool); keystone STARK verifier gated OFF
# (raw ML-DSA-65 finality); confidential value ops gated OFF (DEC-029); and the
# seedless deterministic epoch-boundary seed (epoch_seed_from_state_root_height
# = 1, WC-G1/DEC-022) that makes the round-50000-class EPOCH-SEED-STALL
# structurally impossible. Structure — 2 consensus seats, each a 10-operator
# cluster (threshold 7-of-10, 7 active + 3 standby) — unchanged; see
# chains/genesis below.
genesis_hash = "0xdc0ff48230ce904893ee3184c331b405251a2dd7491e856b1d4be3944413f315"

# ---- Dynamic genesis resolution ----
# Full genesis content for this network, committed in this repo and served
# over raw.githubusercontent. A booting node fetches genesis_url, recomputes
# keccak256 over the raw on-disk bytes, and requires it to equal genesis_hash
# above BEFORE init. This lets the OS image bake WHO to trust (this registry
# path) rather than WHAT to run (no baked hash), so a re-genesis is picked up
# on the next boot with no image rebuild.
#
# TRUST NOTE (testnet): genesis_hash is the authoritative pin and the only
# integrity check on testnet. The expected hash and the served content share
# one trust root (this repo / GitHub), so the keccak match is CIRCULAR — it is
# NOT cryptographic integrity against a registry or GitHub compromise. This is
# acceptable only because testnet is value-less and wiped without notice. See
# README.md "Dynamic genesis resolution" and the mainnet-only groundwork below.
genesis_url    = "https://raw.githubusercontent.com/monolythium/chain-registry/master/chains/genesis/testnet-69420.genesis.toml"
genesis_sha256 = "145b95b6e9dd4eae220001b4521fdcc149c559688c6f5bd993134939a04f47a2"

# ---- Canonical milestone config (rolling-upgrade mechanism) ----
# The canonical, cosigned milestone config for this network, committed in this
# repo. Milestones activate protocol parameters / precompile gates at chosen
# heights without a re-genesis. This is the CANONICAL REFERENCE, not a runtime
# fetch: operators fetch milestones_url at deploy time, `cosign verify-blob` the
# .sig/.pem published by the milestones-attestation CI to the rolling GitHub
# Release `milestones-testnet-69420` (master requires PRs, so the bot publishes
# the cosign artifacts to a Release rather than committing them beside the file),
# then deploy and roll the fleet before the new activation height. The chain
# loads the file as plain config (no in-file signature); on this testnet the
# genesis pins no milestone_digest, so authenticity rests on this sha pin + the
# cosign blob. Mirrors genesis_url's authenticity model.
milestones_url    = "https://raw.githubusercontent.com/monolythium/chain-registry/master/chains/milestones/testnet-69420.milestones.toml"
milestones_sha256 = "005b06ebfe5413602c3477fdf82b910304f6504d1f9548a327d8c990ec7b7810"

# ---- MAINNET-ONLY genesis hardening (groundwork — not used on testnet) ----
# These fields are documented placeholders for the mainnet trust model and are
# intentionally left commented. They MUST NOT carry active values on this
# testnet entry; a node MUST ignore them for testnet-69420. They break the
# circular testnet trust by adding factors the registry writer does not
# control. See README.md "Dynamic genesis resolution" for the full model.
#
# genesis_sig_url      = "<https URL of the cosign-signed genesis blob signature>"
#   Detached cosign signature (.sig) over the genesis blob, fetched and
#   verified with `cosign verify-blob` BEFORE the keccak hash check.
#
# genesis_cert_identity = "<cosign certificate identity / SAN regex>"
#   Expected signing identity (OIDC SAN regex) baked into the signed OS image,
#   NOT trusted from the registry. The image pins WHO may sign genesis.
#
# genesis_cert_issuer   = "<cosign OIDC issuer URL>"
#   Expected OIDC issuer for the cosign certificate (e.g. the GitHub Actions
#   OIDC issuer). Also image-baked, used with genesis_cert_identity.
#
# registry_rev          = "<full 40-char commit SHA of this registry>"
#   Commit-SHA pin for this registry, baked per signed image instead of the
#   moving `master` ref, so a registry-account compromise or stale CDN edge
#   cannot silently redirect genesis_hash / genesis_url.

# mono-core commit used to build the advertised foundation operator binary.
# 2026-06-30 v0.3.0 LIFECYCLE-ACTIVE RE-GENESIS to `v0.3.0-testnet`, mono-core
# master @ 4d781ed9 (version 0.3.0) — see genesis 0xdc0ff48… above. v0.3.0
# activates the dynamic DVT cluster lifecycle from genesis and fully purges
# FROST/DKG/BLS from the chain. The cosigned v0.3.0 protocore binary — confirmed
# running on the live fleet (genesis 0xdc0ff48, chain_id 69420 over RPC), and the
# binary Monarch OS bakes — has sha256 =
# 653347dbdbcad29da8bc95ac3c0c97140171c8c55072add0da74fe3d7b3e17e5
# (= binary_release_sha256 below).
#
# The `v0.3.0-testnet` GitHub release (tarball + cosign attestation) IS
# published; its EXTRACTED protocore binary sha256 == binary_release_sha256
# below (653347db…), and the release .tar.gz sha256 == release_tarball_sha256
# below. This binary carries the open-seat marketplace primitive (#147) with the
# audit fixes (#150/#152/#153) and the cassette supervisor (#127); the dynamic
# cluster lifecycle (#166) is active from genesis, and the open-seat selectors
# and the #58 block.timestamp clamp activate via the canonical milestone config
# (see milestones_url) at the heights pinned there.
#
# Keep `binary_sha` = 4d781ed9 in lock-step with the mono-core-sdk pin
# (packages/ts/src/registry.ts) and the browser-wallet build-info trust pin.
binary_sha   = "4d781ed9"

# First-class binary provenance keys (machine-readable; consumed by the Monarch
# OS release-drift guard `scripts/verify-release-matches-registry.sh`). These
# MUST stay in lock-step with the comment block above on every re-genesis /
# rolling binary swap. `release_tag` is the signed protocore release operators
# run; `binary_release_sha256` is the sha256 of the EXTRACTED `protocore`
# binary from that release's linux tarball (NOT the mono-core commit, which is
# `binary_sha`).
release_tag           = "v0.3.0-testnet"
binary_release_sha256 = "653347dbdbcad29da8bc95ac3c0c97140171c8c55072add0da74fe3d7b3e17e5"
# sha256 of the published v0.3.0-testnet release .tar.gz (its EXTRACTED binary
# sha256 = binary_release_sha256 = 653347db… above; the .tar.gz carries the
# cosign .sig/.pem produced by the protocore release.yml tag-workflow identity).
release_tarball_sha256 = "5f8355dd1738f572550d13ab9bca8bf1b551e78a4df1703cb32d993e67818fd0"

