# Pinned to the genesis the live cluster is currently running. Any
# wipe + regenesis flips this hash and bumps the registry entry.
# 2026-06-19 re-genesis (protocore v0.1.70-testnet) set the genesis_hash below.
# Structure — 2 consensus seats, each a 10-operator cluster (threshold 7-of-10,
# 7 active + 3 standby) — unchanged since the 2026-06-10 2-cluster cutover; see
# chains/genesis below. Supersedes the earlier 5-of-7 pin.
genesis_hash = "0x6c76fe490fab7195fc5821b052ca7a90b8fe96e0b18204d28430e97f57751943"

# ---- Dynamic genesis resolution ----
# Full genesis content for this network, committed in this repo and served
# over raw.githubusercontent. A booting node fetches genesis_url, recomputes
# keccak256 over the raw on-disk bytes, and requires it to equal genesis_hash
# above BEFORE init. This lets the OS image bake WHO to trust (this registry
# path) rather than WHAT to run (no baked hash), so a re-genesis is picked up
# on the next boot with no image rebuild.
#
# TRUST NOTE (testnet): genesis_hash is the authoritative pin and the only
# integrity check on testnet. The expected hash and the served content share
# one trust root (this repo / GitHub), so the keccak match is CIRCULAR — it is
# NOT cryptographic integrity against a registry or GitHub compromise. This is
# acceptable only because testnet is value-less and wiped without notice. See
# README.md "Dynamic genesis resolution" and the mainnet-only groundwork below.
genesis_url    = "https://raw.githubusercontent.com/monolythium/chain-registry/master/chains/genesis/testnet-69420.genesis.toml"
genesis_sha256 = "4a63e7093a1378492da3ad9b9d9237294d43b98089667f9f0161dd5b9b6c71e9"

# ---- MAINNET-ONLY genesis hardening (groundwork — not used on testnet) ----
# These fields are documented placeholders for the mainnet trust model and are
# intentionally left commented. They MUST NOT carry active values on this
# testnet entry; a node MUST ignore them for testnet-69420. They break the
# circular testnet trust by adding factors the registry writer does not
# control. See README.md "Dynamic genesis resolution" for the full model.
#
# genesis_sig_url      = "<https URL of the cosign-signed genesis blob signature>"
#   Detached cosign signature (.sig) over the genesis blob, fetched and
#   verified with `cosign verify-blob` BEFORE the keccak hash check.
#
# genesis_cert_identity = "<cosign certificate identity / SAN regex>"
#   Expected signing identity (OIDC SAN regex) baked into the signed OS image,
#   NOT trusted from the registry. The image pins WHO may sign genesis.
#
# genesis_cert_issuer   = "<cosign OIDC issuer URL>"
#   Expected OIDC issuer for the cosign certificate (e.g. the GitHub Actions
#   OIDC issuer). Also image-baked, used with genesis_cert_identity.
#
# registry_rev          = "<full 40-char commit SHA of this registry>"
#   Commit-SHA pin for this registry, baked per signed image instead of the
#   moving `master` ref, so a registry-account compromise or stale CDN edge
#   cannot silently redirect genesis_hash / genesis_url.

# mono-core commit used to build the advertised foundation operator binary.
# 2026-06-19 RE-GENESIS (genesis 0x6c76fe49 above; 2x10 DVT, 7-of-10): the
# canonical signed, attested protocore release new operators download is
# `v0.1.70-testnet`, built from mono-core commit f2964a9c. v0.1.70 carries
# INPLACE-RECOVERY-0013 (committee-wide epoch-boundary round-cert repair sweep)
# on top of the prior V4-LIVE-0009..0012 proposer / replay-residency fixes and
# the MRV app-contract parity groundwork (inert below its activation milestone).
# Built --features mdbx,indexer-postgres,mesh,sp1-verifier; indexer enabled.
#
# PROVENANCE NOTE: f2964a9c is the exact build commit. It is content-identical
# (empty diff) to mono-core master HEAD after a message-only rebase, and is
# tagged `v0.1.70-testnet` in github.com/monolythium/mono-core so this pin stays
# permanently reachable. Keep `binary_sha` = f2964a9c in lock-step with the
# mono-core-sdk pin (packages/ts/src/registry.ts); do NOT swap it to the rebased
# master hash — that would desync the published SDK / wallet trust pins.
#
# Verify the signed release before trusting it (cosign certificate identity =
# the release.yml workflow @refs/tags/v0.1.70-testnet):
#   github.com/monolythium/protocore  release  v0.1.70-testnet
#   release tarball  sha256: 5121fa94a732731fdbd22a1ea8e65c2a7bca584ea9a76f4320089252e01ee1aa
#   extracted binary sha256: b24d15ec8a4340a94c3495bc78acca5312a7345dedba4030532086498b574d94
binary_sha   = "f2964a9c"

# First-class binary provenance keys (machine-readable; consumed by the Monarch
# OS release-drift guard `scripts/verify-release-matches-registry.sh`). These
# MUST stay in lock-step with the comment block above on every re-genesis /
# rolling binary swap. `release_tag` is the signed protocore release operators
# run; `binary_release_sha256` is the sha256 of the EXTRACTED `protocore`
# binary from that release's linux tarball (NOT the mono-core commit, which is
# `binary_sha`).
release_tag           = "v0.1.70-testnet"
binary_release_sha256 = "b24d15ec8a4340a94c3495bc78acca5312a7345dedba4030532086498b574d94"
release_tarball_sha256 = "5121fa94a732731fdbd22a1ea8e65c2a7bca584ea9a76f4320089252e01ee1aa"

