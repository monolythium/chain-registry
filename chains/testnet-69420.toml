# ---- Foundation RPC endpoints ----
# Order = first-touch preference. Clients walk top-to-bottom and pick
# the first reachable endpoint. After connection the SDK switches to
# on-chain `node-registry` (precompile 0x1005) for live peer selection.
#
# The healthy public foundation node endpoints are advertised below. Each
# protocore process listens on 0.0.0.0:8545; the cost-based RPC rate-limiter is
# the DoS mitigation. Reachability of each endpoint below was confirmed by an
# external provenance, sync, and P2P TCP probes at the v0.1.44 testnet head.

